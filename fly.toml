# fly.toml app configuration file generated for campus-resource-hub-backend on 2026-06-22T16:26:24Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'campus-resource-hub-backend'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
